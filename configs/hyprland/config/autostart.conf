exec-once = awww-daemon
exec-once = swww-daemon
exec-once = hypridle
exec-once = playerctld
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user enable --now easyeffects
exec-once = ~/.config/hypr/scripts/settings_watcher.sh &
exec-once = ~/.config/hypr/scripts/volume_listener.sh
# exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'ArcMidnight-Cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Shell.qml
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &

exec-once = dbus-update-activation-environment --systemd \
  NIXOS_OZONE_WL \
  XDG_CURRENT_DESKTOP \
  XDG_SESSION_TYPE \
  WAYLAND_DISPLAY
