# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Mouse & Gestures ─────────
# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ───────── Window Management ─────────
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, W, togglefloating
bind = $mainMod, H, workspace, e+1
bind = $mainMod, L, workspace, e-1

# ───────── System & Hardware ─────────
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = ALT SHIFT, comma, exec, swayosd-client --brightness lower
bindl = ALT SHIFT, period, exec, swayosd-client --brightness raise
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = SUPER SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
bindl = SUPER, F11, exec, ~/.config/hypr/scripts/lock.sh

# ───────── Media & Audio ─────────
bindl = $mainMod, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = $mainMod, 0, exec, swayosd-client --output-volume mute-toggle
bind = $mainMod, minus, exec, swayosd-client --output-volume lower
bind = $mainMod, equal, exec, swayosd-client --output-volume raise

# ───────── Applications & Launchers ─────────

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, F, exec, $filemanager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, vesktop
bind = $mainMod, S, exec, flatpak run com.spotify.Client
bind = $mainMod SHIFT, Z, exec, flatpak run app.zen_browser.zen
bind = $mainMod, Z, exec, zeditor

# ───────── Quickshell Controls ─────────

bind = $mainMod, F10, exec, ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = CTRL SUPER ALT, RETURN, exec, ~/.config/hypr/scripts/reload.sh
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/qs_manager.sh toggle settings
bind = $mainMod, F3, exec, ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = ALT, SPACE, exec, ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, F2, exec, ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod, F4, exec, ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod, F5, exec, ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, F6, exec, ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod, M, exec, ~/.config/hypr/scripts/qs_manager.sh toggle music

# ───────── Workspaces ─────────

bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move
