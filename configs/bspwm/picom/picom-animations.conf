# Animations for Rofi
{
	match = "class_g = 'Rofi' || "
	 		"class_g = 'Polybar'";
	animations = (
	{
		triggers = ["close", "hide"];
		preset = "disappear";
		duration = 0.08;
		scale = 0.5;
	},
	{
		triggers = ["open", "show"];
		preset = "appear";
		duration = 0.15;
		scale = 0.5;
	}
	)
},

