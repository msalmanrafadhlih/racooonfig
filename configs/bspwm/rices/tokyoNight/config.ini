[colors]
background = #1a1b2614
background-alt = #24283b
foreground = #c0caf5
primary = #e0af68
secondary = #9ece6a
alert = #db4b4b
disabled = #414868
blue = #7aa2f7  

[bar/bar]
width = 100%
height = 27pt
radius = 6
fixed-center = true
dpi = 96
offset-x = 0
offset-y = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 7pt
border-color = ${colors.background}
border-radius = 15

padding-left = 0
padding-right = 1

font-0 = Sofia Pro:style=Bold:size=14;3
font-1 = Material Design Icons Desktop:size=10;3
font-2 = Material Design Icons Desktop:size=14;5
font-3 = JetBrainsMono Nerd Font:size=23;6
font-4 = JetBrainsMono Nerd Font:size=11;5
font-5 = JetBrainsMono Nerd Font:size=10;4
font-6 = Material Design Icons Desktop:size=10;4
font-7 = Sofia Pro:style=Bold:size=12;0
font-8 = Material Design Icons Desktop:size=12;4
font-9 = Feather:style=Bold:size=12;6
font-10 = Material Design Icons Desktop:size=14:style=bold;5
font-11 = Sofia Pro:style=Bold:size=8;3
font-12 = Material Design Icons Desktop:size=8;3
font-13 = JetBrainsMono Nerd Font:size=8;4
font-14 = JetBrainsMono Nerd Font:size=15;4
font-15 = Grid Styles:size=24;4

# modules-left = launcher left1 xworkspaces right1 seperator left3 updates spotify gamemode right3
# modules-center = date
# modules-right = bspwm tray left2 battery network bluetooth microphone pulseaudio right2 github powermenu

modules-left = launcher left1 xworkspaces right1 seperator left3 updates right3
modules-center = date
modules-right = tray github left2 battery network bluetooth pulseaudio gamemode bspwm right2 powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

# include-file = modules/gylphs.ini 
# include-file = modules/modules.ini

[settings]
screenchange-reload = true
pseudo-transparency = true

