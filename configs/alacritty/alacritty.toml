[general]
import = ["colors.toml", "fonts.toml"]

live_config_reload = true

[env]
TERM = "alacritty"
WINIT_X11_SCALE_FACTOR = "1.0"

[cursor]
blink_interval = 550
unfocused_hollow = true
thickness = 0.15

[cursor.style]
blinking = "On"
shape = "Block"

[selection]
save_to_clipboard = true

[window]
decorations = "none"
dynamic_title = true
opacity = 0.7
padding = { x = 10, y = 10 }
dynamic_padding = true
resize_increments = true

[scrolling]
history = 10000
multiplier = 3

[bell]
animation = "Linear"
duration = 0
command = { program = "canberra-gtk-play", args = ["~/.config/Assets/Sounds/Ding.wav"] }
